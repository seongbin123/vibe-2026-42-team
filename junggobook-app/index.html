<!DOCTYPE html>
<html lang="ko"> <!-- deploy test -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수원대 중고책 거래</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 헤더 -->
  <header>
    <div class="header-inner">
      <h1>📚 수원대 중고책</h1>
      <button class="btn-primary" onclick="openRegisterModal()">+ 책 등록</button>
    </div>
  </header>

  <!-- 검색 + 필터 -->
  <div class="search-section">
    <input type="text" id="searchInput" placeholder="책 제목, 과목으로 검색..." oninput="filterBooks()">
    <div class="filters">
      <select id="filterDept" onchange="filterBooks()">
        <option value="">전체 학과</option>
        <option>컴퓨터학과</option>
        <option>경영학과</option>
        <option>전자공학과</option>
        <option>기계공학과</option>
        <option>건축학과</option>
        <option>간호학과</option>
        <option>사회복지학과</option>
        <option>영어영문학과</option>
        <option>기타</option>
      </select>
      <select id="filterCondition" onchange="filterBooks()">
        <option value="">전체 상태</option>
        <option>상</option>
        <option>중</option>
        <option>하</option>
      </select>
      <select id="filterPrice" onchange="filterBooks()">
        <option value="">전체 가격</option>
        <option value="0-5000">5,000원 이하</option>
        <option value="5000-10000">5,000 ~ 10,000원</option>
        <option value="10000-20000">10,000 ~ 20,000원</option>
        <option value="20000-99999999">20,000원 이상</option>
      </select>
    </div>
  </div>

  <!-- 책 목록 -->
  <main>
    <div id="bookCount" class="book-count"></div>
    <div id="bookGrid" class="book-grid"></div>
    <div id="emptyMsg" class="empty-msg" style="display:none">
      등록된 책이 없습니다 😢
    </div>
  </main>

  <!-- 책 등록 모달 -->
  <div id="registerModal" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2>📖 책 등록하기</h2>
        <button class="modal-close" onclick="closeRegisterModal()">✕</button>
      </div>
      <form id="registerForm" onsubmit="submitBook(event)">
        <div class="form-group">
          <label>책 제목 *</label>
          <input type="text" id="f-title" placeholder="예: 자료구조론" required>
        </div>
        <div class="form-group">
          <label>저자</label>
          <input type="text" id="f-author" placeholder="예: 홍길동">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>과목명</label>
            <input type="text" id="f-subject" placeholder="예: 자료구조">
          </div>
          <div class="form-group">
            <label>학과</label>
            <select id="f-dept">
              <option value="">선택</option>
              <option>컴퓨터학과</option>
              <option>경영학과</option>
              <option>전자공학과</option>
              <option>기계공학과</option>
              <option>건축학과</option>
              <option>간호학과</option>
              <option>사회복지학과</option>
              <option>영어영문학과</option>
              <option>기타</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>가격 (원) *</label>
            <input type="number" id="f-price" placeholder="예: 8000" min="0" required>
          </div>
          <div class="form-group">
            <label>책 상태 *</label>
            <select id="f-condition" required>
              <option value="">선택</option>
              <option>상</option>
              <option>중</option>
              <option>하</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>설명</label>
          <textarea id="f-desc" placeholder="책 상태, 필기 여부 등 자유롭게 적어주세요" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>연락처 (카톡 ID 또는 전화번호) *</label>
          <input type="text" id="f-contact" placeholder="예: kakao123 또는 010-1234-5678" required>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="closeRegisterModal()">취소</button>
          <button type="submit" class="btn-primary" id="submitBtn">등록하기</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 책 상세 모달 -->
  <div id="detailModal" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2 id="d-title"></h2>
        <button class="modal-close" onclick="closeDetailModal()">✕</button>
      </div>
      <div class="detail-body">
        <div class="detail-info">
          <span class="badge-condition" id="d-condition"></span>
          <span class="detail-price" id="d-price"></span>
        </div>
        <div class="detail-row"><span>저자</span><span id="d-author"></span></div>
        <div class="detail-row"><span>과목</span><span id="d-subject"></span></div>
        <div class="detail-row"><span>학과</span><span id="d-dept"></span></div>
        <div class="detail-desc" id="d-desc"></div>
        <div class="contact-box">
          <p>연락처</p>
          <strong id="d-contact"></strong>
        </div>
        <div class="detail-actions">
          <button class="btn-sold" id="d-soldBtn" onclick="markSold()">판매완료 처리</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
